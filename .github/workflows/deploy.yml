name: Deploy Frontend to Lightsail

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH 에이전트 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: 서버 호스트 키 등록
        run: ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: 서버에서 배포
        run: |
          ssh ${{ secrets.LIGHTSAIL_USERNAME }}@${{ secrets.LIGHTSAIL_HOST }} "
            cd /home/ubuntu/tasting-note-web &&
            git pull origin main &&
            npm install &&
            npm run build &&
            pm2 restart frontend &&
            echo 배포 완료
          "
